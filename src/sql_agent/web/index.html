<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SQL Agent</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="Database tables">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div>
            <strong>SQL Agent</strong>
            <small id="connectionState">Checking database</small>
          </div>
        </div>

        <div class="panel-heading">
          <span>Tables</span>
          <button class="icon-button" id="refreshTables" aria-label="Refresh tables" title="Refresh tables">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.4 6.4M3 12A9 9 0 0 1 18.4 5.6M18 2v4h-4M6 22v-4h4"/></svg>
          </button>
        </div>
        <div class="table-list" id="tableList"></div>
      </aside>

      <main class="chat-area">
        <header class="topbar">
          <div>
            <h1>Ask your database</h1>
            <p>Read-only analysis powered by your local SQL agent.</p>
          </div>
          <div class="status-pill">
            <span></span>
            Local model
          </div>
        </header>

        <section class="messages" id="messages" aria-live="polite">
          <article class="message assistant">
            <div class="avatar">AI</div>
            <div class="bubble">
              <p>Ask a question about the connected SQL Server database.</p>
              <div class="suggestions">
                <button type="button">Show me the available tables</button>
                <button type="button">Find the top customer segments</button>
                <button type="button">Compare recent performance by category</button>
              </div>
            </div>
          </article>
        </section>

        <form class="composer" id="chatForm">
          <textarea id="questionInput" name="question" rows="1" placeholder="Ask a data question..." autocomplete="off"></textarea>
          <button class="send-button" type="submit" aria-label="Send question" title="Send question">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 12 14-7-7 14-2-5-5-2Z"/></svg>
          </button>
        </form>
      </main>

      <aside class="trace-panel" aria-label="Agent trace">
        <div class="panel-heading">
          <span>Trace</span>
          <button class="icon-button" id="clearTrace" aria-label="Clear trace" title="Clear trace">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"/></svg>
          </button>
        </div>
        <div class="trace-empty" id="traceEmpty">
          <div class="data-visual" aria-hidden="true">
            <span style="height: 42%"></span>
            <span style="height: 76%"></span>
            <span style="height: 55%"></span>
            <span style="height: 88%"></span>
            <span style="height: 64%"></span>
          </div>
          <p>SQL queries and tool results appear here.</p>
        </div>
        <div class="trace-list" id="traceList"></div>
      </aside>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
